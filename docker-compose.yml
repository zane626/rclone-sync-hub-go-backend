name: rclone-sync-hub

services:
  app:
    image: zane626/rclone-sync-hub-go-backend
    container_name: rclone-sync-hub-go-backend_container
    ports:
      - "8080:8080"
    environment:
      # 数据库（与下方 mysql 服务一致）
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: app
      DB_PASSWORD: apppassword
      DB_NAME: rclone_sync_hub
      # 服务
      SERVER_PORT: "8080"
      SERVER_MODE: release
      EMBED_FRONTEND: "true"
      ENABLE_SWAGGER: "true"
      # 扫描（本地目录在容器内路径，需与 volumes 挂载一致）
      SCAN_LOCAL_PATH: /volumes
      SCAN_ENABLED: "false"
      SCAN_INTERVAL_SECONDS: "300"
      # Worker
      WORKER_MAX_CONCURRENT: "3"
      WORKER_MAX_RETRY: "3"
      WORKER_QUEUE_SIZE: "1000"
      # 日志
      LOG_LEVEL: info
      LOG_FORMAT: json
    volumes:
      # 本地目录需要挂载到 /volumes
      - ./data/local:/volumes:ro
      - ./rclone:/root/.config/rclone:ro
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    container_name: rclone-sync-hub-go-mysql_container
    command:
      - --default-authentication-plugin=caching_sha2_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --explicit_defaults_for_timestamp=true
      - --bind-address=0.0.0.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rclone_sync_hub
      MYSQL_USER: app
      MYSQL_PASSWORD: apppassword
    volumes:
      - ./mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 3s
      retries: 5
      start_period: 30s
