name: rclone-sync-hub

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      # 数据库（与下方 mysql 服务一致）
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: app
      DB_PASSWORD: apppassword
      DB_NAME: rclone_sync_hub
      # 服务
      SERVER_PORT: "8080"
      SERVER_MODE: release
      EMBED_FRONTEND: "true"
      ENABLE_SWAGGER: "true"
      # 扫描（本地目录在容器内路径，需与 volumes 挂载一致）
      SCAN_LOCAL_PATH: /volumes
      SCAN_ENABLED: "false"
      SCAN_INTERVAL_SECONDS: "300"
      # Worker
      WORKER_MAX_CONCURRENT: "3"
      WORKER_MAX_RETRY: "3"
      WORKER_QUEUE_SIZE: "1000"
      # 日志
      LOG_LEVEL: info
      LOG_FORMAT: json
      # 可选：RCLONE_BIN_PATH 默认 rclone
    volumes:
      - ./data/local:/volumes:ro
      - C:\Users\Administrator\AppData\Roaming\rclone:/root/.config/rclone:ro
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: rclone_sync_hub
      MYSQL_USER: app
      MYSQL_PASSWORD: apppassword
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  mysql_data:
  rclone-config:
