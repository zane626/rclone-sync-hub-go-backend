# 本地开发用配置：Air 热重载 + Swagger + 连本地 MySQL（需先 docker compose up mysql -d）
server:
  port: 8080
  mode: debug
  embed_frontend: true
  enable_swagger: true

database:
  host: localhost
  port: 3306
  user: app
  password: apppassword
  dbname: rclone_sync_hub
  charset: utf8mb4
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_idle_time_mins: 10

scan:
  local_path: ./data/local
  enabled: false
  interval_seconds: 300

worker:
  max_concurrent: 3
  max_retry: 3
  queue_size: 1000

rclone:
  bin_path: rclone

log:
  level: debug
  format: console
