# Rclone Sync Hub 配置文件示例（MySQL）

server:
  port: 8080
  mode: release          # debug / release
  embed_frontend: true   # 生产环境嵌入 Vue 静态资源
  enable_swagger: false  # 仅开发环境建议 true；生产必须 false

database:
  host: localhost   # 使用 docker-compose 时改为 mysql
  port: 3306
  user: app
  password: apppassword
  dbname: rclone_sync_hub
  charset: utf8mb4
  max_open_conns: 25
  max_idle_conns: 10
  conn_max_idle_time_mins: 10

# 定时扫描（上传目标由任务表 upload_tasks 的 remote_name/remote_path 决定）
scan:
  local_path: /data/local    # 要扫描的本地目录（Docker 中可挂载）
  cron_schedule: "*/5 * * * *"
  enabled: true
  interval_seconds: 300      # 扫描间隔（秒），同时用于 watch_folders 扫描

worker:
  max_concurrent: 3   # 最大并发上传数
  max_retry: 3
  queue_size: 1000

rclone:
  bin_path: rclone

log:
  level: info   # debug / info / warn / error
  format: json  # json / console
