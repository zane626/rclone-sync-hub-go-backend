basePath: /
definitions:
  api.FSSubDir:
    properties:
      has_sub_dirs:
        type: boolean
      name:
        type: string
      path:
        type: string
    type: object
  api.FSSubDirListResponse:
    properties:
      items:
        items:
          $ref: '#/definitions/api.FSSubDir'
        type: array
    type: object
  api.TaskBatchReq:
    properties:
      ids:
        description: 任务 ID 列表
        items:
          type: integer
        type: array
    required:
    - ids
    type: object
  api.TaskCreateReq:
    properties:
      file_name:
        type: string
      file_size:
        type: integer
      local_path:
        type: string
      remote_name:
        type: string
      remote_path:
        type: string
      watch_folder_id:
        type: integer
      watch_folder_name:
        type: string
    required:
    - local_path
    - remote_name
    - remote_path
    type: object
  api.WatchFolderCreateReq:
    properties:
      local_path:
        type: string
      max_depth:
        description: 可选，0 表示不限制
        type: integer
      name:
        type: string
      remote_name:
        type: string
      remote_path:
        type: string
      scan_interval_seconds:
        description: 可选，默认 300
        type: integer
      sync_type:
        description: 可选，默认 local_to_remote
        type: string
    required:
    - local_path
    - name
    - remote_name
    - remote_path
    type: object
  api.WatchFolderUpdateReq:
    properties:
      enabled:
        type: boolean
      local_path:
        type: string
      max_depth:
        type: integer
      name:
        type: string
      remote_name:
        type: string
      remote_path:
        type: string
      scan_interval_seconds:
        type: integer
      status:
        type: string
      sync_type:
        type: string
    type: object
  model.FileRecord:
    properties:
      createdAt:
        type: string
      fileHash:
        description: 可选，用于去重
        type: string
      fileSize:
        type: integer
      id:
        type: integer
      localPath:
        type: string
      relativePath:
        description: 相对扫描根目录的路径
        type: string
      remotePath:
        type: string
      updatedAt:
        type: string
      uploadedAt:
        type: string
    type: object
  model.UploadLog:
    properties:
      bytesDone:
        type: integer
      bytesTotal:
        type: integer
      createdAt:
        type: string
      id:
        type: integer
      message:
        type: string
      percent:
        type: number
      speed:
        description: bytes/s
        type: integer
      taskID:
        type: integer
    type: object
  model.UploadTask:
    properties:
      accumulatedFailures:
        description: 累计失败次数（便于分析）
        type: integer
      createdAt:
        type: string
      durationSeconds:
        description: 时间维度
        type: integer
      errorMsg:
        description: 最后一次错误信息
        type: string
      fileName:
        description: 文件名
        type: string
      fileRecord:
        allOf:
        - $ref: '#/definitions/model.FileRecord'
        description: 关联（不参与表结构，仅查询用）
      fileRecordID:
        type: integer
      fileSize:
        description: 文件信息
        type: integer
      finishedAt:
        description: 上传结束时间
        type: string
      id:
        type: integer
      lastProgressAt:
        description: 最近一次进度上报时间
        type: string
      lastStatusAt:
        description: 最近一次状态变更时间
        type: string
      localPath:
        description: 文件本地路径
        type: string
      log:
        description: 日志与分析
        type: string
      progress:
        description: 上传进度（0-100）
        type: number
      remoteName:
        description: 上传网盘（remote 名称）
        type: string
      remotePath:
        description: 上传路径
        type: string
      retryCount:
        description: 重试次数
        type: integer
      speed:
        description: 最近一次上报的速度（bytes/s）
        type: integer
      startedAt:
        description: 上传开始时间
        type: string
      status:
        description: 状态与进度
        type: string
      updatedAt:
        type: string
      watchFolderID:
        description: 归属与标识
        type: integer
      watchFolderName:
        description: 所属监听文件夹名称快照
        type: string
    type: object
  model.WatchFolder:
    properties:
      createdAt:
        type: string
      enabled:
        description: 是否启用该监听
        type: boolean
      failedFileCount:
        description: 累计上传失败文件数
        type: integer
      id:
        type: integer
      lastActiveAt:
        description: 最近有文件变更 / 上传的时间
        type: string
      lastError:
        description: 最近一次错误信息（便于排查）
        type: string
      lastScanAt:
        description: 最近一次扫描时间
        type: string
      lastSyncAt:
        description: 最近一次同步时间
        type: string
      localPath:
        description: 注意：MySQL InnoDB 单列索引最大 3072 字节（utf8mb4 约 768 字符），且 LocalPath
          上有唯一索引，因此长度限制为 768。
        type: string
      maxDepth:
        description: 最大监听深度，0 表示不限制
        type: integer
      name:
        description: 基本配置
        type: string
      nextScanAt:
        description: 预计下一次扫描时间（可选）
        type: string
      remoteName:
        description: rclone remote 名称
        type: string
      remotePath:
        description: 远端路径
        type: string
      scanIntervalSeconds:
        description: 配置相关扩展
        type: integer
      status:
        description: 状态信息
        type: string
      syncType:
        description: 同步类型
        type: string
      totalFileCount:
        description: 统计维度（便于分析与展示）
        type: integer
      totalFileSize:
        description: 当前已知文件总大小（字节）
        type: integer
      updatedAt:
        type: string
      uploadedBytes:
        description: 累计已上传字节数
        type: integer
      uploadedFileCount:
        description: 累计已成功上传文件数
        type: integer
      windowUploadedBytes:
        description: 窗口内上传字节数
        type: integer
      windowUploadedFiles:
        description: 最近一段时间的窗口统计（可用于展示趋势）
        type: integer
    type: object
  service.DashboardData:
    properties:
      by_status:
        description: ByStatus 按状态分布（饼图/柱状图）
        items:
          $ref: '#/definitions/service.StatusItemVO'
        type: array
      by_time:
        description: ByTime 按日趋势（折线图）
        items:
          $ref: '#/definitions/service.TimeItemVO'
        type: array
      by_watch_folder:
        description: ByWatchFolder 按监听文件夹分布（表格+柱状图）
        items:
          $ref: '#/definitions/service.WatchFolderItemVO'
        type: array
      items:
        allOf:
        - $ref: '#/definitions/service.DashboardItemsVO'
        description: Items 列表类数据
      overview:
        allOf:
        - $ref: '#/definitions/service.OverviewVO'
        description: Overview 概览数字（卡片）
    type: object
  service.DashboardItemsVO:
    properties:
      failed_tasks:
        items:
          $ref: '#/definitions/model.UploadTask'
        type: array
      recent_tasks:
        items:
          $ref: '#/definitions/model.UploadTask'
        type: array
    type: object
  service.OverviewVO:
    properties:
      recent_24h_completed:
        type: integer
      recent_24h_failed:
        type: integer
      task_failed:
        type: integer
      task_paused:
        type: integer
      task_pending:
        type: integer
      task_running:
        type: integer
      task_success:
        type: integer
      task_total:
        type: integer
      uploaded_bytes_total:
        type: integer
      uploaded_files_total:
        type: integer
      watch_folder_count:
        type: integer
    type: object
  service.StatusItemVO:
    properties:
      count:
        type: integer
      label:
        type: string
      status:
        type: string
    type: object
  service.TaskBatchResult:
    properties:
      failed:
        additionalProperties:
          type: string
        description: taskID -> error message
        type: object
      ok_ids:
        items:
          type: integer
        type: array
    type: object
  service.TimeItemVO:
    properties:
      completed_count:
        type: integer
      date:
        type: string
      failed_count:
        type: integer
      uploaded_bytes:
        type: integer
    type: object
  service.WatchFolderItemVO:
    properties:
      failed_count:
        type: integer
      paused_count:
        type: integer
      pending_count:
        type: integer
      running_count:
        type: integer
      success_count:
        type: integer
      task_count:
        type: integer
      uploaded_bytes:
        type: integer
      uploaded_files:
        type: integer
      watch_folder_id:
        type: integer
      watch_folder_name:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    name: API Support
    url: https://github.com/your-org/rclone-sync-hub
  description: 文件上传调度系统 REST API：任务列表、扫描、重试、统计等
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Rclone Sync Hub API
  version: "1.0"
paths:
  /api/analytics/dashboard:
    get:
      consumes:
      - application/json
      description: 返回概览数字、按状态/按监听文件夹/按时间趋势的图表数据，以及最近任务与失败任务列表，供数据分析页一次拉取
      parameters:
      - description: 趋势图天数，默认 7
        in: query
        name: days
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.DashboardData'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 数据分析仪表盘
      tags:
      - analytics
  /api/fs/subdirs:
    get:
      description: 根据传入的本地路径，返回该路径下所有一级子文件夹（不包含文件）
      parameters:
      - description: 本地起始路径，如 D:/data 或 /data/local
        in: query
        name: path
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.FSSubDirListResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取指定路径下的子文件夹
      tags:
      - filesystem
  /api/rclone/configs:
    get:
      description: 调用 `rclone config show` 并解析出 remote 名称与类型，过滤掉敏感字段
      produces:
      - application/json
      responses:
        "200":
          description: items 为 remote 列表
          schema:
            additionalProperties: true
            type: object
        "500":
          description: error 为错误信息
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取 rclone remote 配置列表
      tags:
      - rclone
  /api/tasks:
    get:
      consumes:
      - application/json
      description: 按状态筛选并分页返回上传任务，不传 status 时返回全部
      parameters:
      - description: '任务状态: pending|running|success|failed，空为全部'
        in: query
        name: status
        type: string
      - default: 1
        description: 页码，从 1 开始
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: items 为任务列表，total 为总条数
          schema:
            additionalProperties: true
            type: object
        "500":
          description: error 为错误信息
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 分页获取上传任务列表
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: 新建一个上传任务（默认状态为待上传）
      parameters:
      - description: 任务配置
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TaskCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.UploadTask'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 创建上传任务
      tags:
      - tasks
  /api/tasks/{id}:
    delete:
      description: 上传中的任务不可删除
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 删除上传任务
      tags:
      - tasks
  /api/tasks/{id}/logs:
    get:
      consumes:
      - application/json
      description: 按任务 ID 返回 upload_logs 中的日志列表，支持 limit 限制条数
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 最多返回条数，默认 500
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.UploadLog'
            type: array
        "400":
          description: invalid id
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取任务上传日志
      tags:
      - tasks
  /api/tasks/{id}/pause:
    post:
      description: 上传中的任务不可暂停
      parameters:
      - description: 任务 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 暂停上传任务
      tags:
      - tasks
  /api/tasks/batch/delete:
    post:
      consumes:
      - application/json
      description: 对传入的任务 ID 列表执行删除操作，running 状态的任务会失败并给出原因
      parameters:
      - description: 任务 ID 列表
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TaskBatchReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.TaskBatchResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 批量删除上传任务
      tags:
      - tasks
  /api/tasks/batch/pause:
    post:
      consumes:
      - application/json
      description: 对传入的任务 ID 列表执行暂停操作，running 状态的任务会失败并给出原因
      parameters:
      - description: 任务 ID 列表
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TaskBatchReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.TaskBatchResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 批量暂停上传任务
      tags:
      - tasks
  /api/tasks/batch/retry:
    post:
      consumes:
      - application/json
      description: 对传入的任务 ID 列表执行重试操作，running 状态的任务会失败并给出原因
      parameters:
      - description: 任务 ID 列表
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.TaskBatchReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/service.TaskBatchResult'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 批量重试上传任务
      tags:
      - tasks
  /api/watch-folders:
    get:
      description: 按状态分页获取监听文件夹列表
      parameters:
      - description: '状态: detecting|watching|stopped|paused|error'
        in: query
        name: status
        type: string
      - default: 1
        description: 页码，从 1 开始
        in: query
        name: page
        type: integer
      - default: 20
        description: 每页条数
        in: query
        name: page_size
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: items 为列表，total 为总数
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 列出监听文件夹
      tags:
      - watch-folders
    post:
      consumes:
      - application/json
      description: 新增一个被监听并同步到指定 rclone remote 的本地目录
      parameters:
      - description: 监听文件夹配置
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.WatchFolderCreateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WatchFolder'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 创建监听文件夹
      tags:
      - watch-folders
  /api/watch-folders/{id}:
    delete:
      parameters:
      - description: 监听文件夹 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 删除监听文件夹
      tags:
      - watch-folders
    get:
      parameters:
      - description: 监听文件夹 ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WatchFolder'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取监听文件夹详情
      tags:
      - watch-folders
    put:
      consumes:
      - application/json
      parameters:
      - description: 监听文件夹 ID
        in: path
        name: id
        required: true
        type: integer
      - description: 更新内容（全部可选）
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.WatchFolderUpdateReq'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/model.WatchFolder'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 更新监听文件夹
      tags:
      - watch-folders
swagger: "2.0"
